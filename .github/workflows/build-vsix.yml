name: Build VSIX

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out frostfire-theme.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: frostfire-theme
          path: frostfire-theme.vsix
          retention-days: 90
