name: Build VSIX

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --out frostfire-theme.vsix

      - name: Upload artifact (all branches)
        uses: actions/upload-artifact@v7
        with:
          name: frostfire-theme
          path: frostfire-theme.vsix
          retention-days: 90

      - name: Publish latest release (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest frostfire-theme.vsix \
            --title "Frostfire Theme – Latest Build" \
            --notes "Automatically built from the latest commit on \`main\`. Download \`frostfire-theme.vsix\` and install via: \`code --install-extension frostfire-theme.vsix\`" \
            --prerelease \
            --target ${{ github.sha }}
